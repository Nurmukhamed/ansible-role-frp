- name: Install frp client systemd unit.
  ansible.builtin.template:
    src: frpc.service.j2
    dest: /etc/systemd/system/frpc.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Start frpc service
    - Restart frpc service

- name: Create client toml file from template.
  ansible.builtin.template:
    src: frpc.toml.j2
    dest: "{{ etcdir }}/{{ frp_common['client']['configfile'] }}"
    owner: "{{ frp_common['user'] }}"
    group: "{{ frp_common['group'] }}"
    mode: '0640'
  notify:
    - Start frpc service
    - Restart frpc service
